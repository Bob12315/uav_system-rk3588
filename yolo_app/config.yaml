# RK3588 上验证过的 Rockchip YOLO11 INT8 模型
model_path: "../data/models/best-int8-rk3588.rknn"

# 视频输入源：
# 1. 如果是本地视频设备，请填写 /dev/videoX
# 2. 如果是 UDP H264/RTP 输入，请直接填写端口号，例如 "5600"
# gazebo模拟器，启动前执行：gz topic -t /world/iris_runway/model/iris_with_gimbal/model/gimbal/link/pitch_link/sensor/camera/image/enable_streaming -m gz.msgs.Boolean -p "data: 1"
# 3. 仍兼容 RTSP、本地视频文件，以及完整 GStreamer pipeline
source: /dev/video41

# 板载 USB 摄像头验证配置；latest_frame 减少推理显示积压带来的画面延迟
camera_width: 640
camera_height: 480
camera_fps: 30
camera_fourcc: "MJPG"
latest_frame: true

# 检测置信度阈值，越高越严格，误检更少但漏检可能变多
conf_thres: 0.25

# NMS 的 IOU 阈值，用于控制重叠候选框的抑制
iou_thres: 0.45

# RKNN 模型类别名称
class_names: ["Target", "bucket", "class_2"]

# 类别过滤列表，空列表表示不过滤；例如 [0] 表示只保留 class_id=0
classes: []

# 当前唯一主目标 JSON 通过 UDP 发送到的目标 IP
udp_ip: "127.0.0.1"

# 当前唯一主目标 JSON 通过 UDP 发送到的目标端口
udp_port: 5005

# 自动选主目标策略，可选 center、biggest、class
selection_mode: "class"

# 当 selection_mode=class 时优先选择的类别名，例如 person,car,target
target_class: "target"

# 锁定目标连续丢失多少帧后判定为真正丢失并自动解锁
max_lost_frames: 5

# 旧版本地显示开关，display.local_window_enabled 存在时以新配置为准
show: false

# 是否保存带标注的视频结果
save_video: false

# 保存视频输出路径，save_video=true 时生效
save_path: "runs/track_output.mp4"

# 普通目标框线宽；锁定目标会在此基础上额外加粗
line_width: 5

# 是否绘制所有可见 tracks；false 时可减少画面信息量
show_all_tracks: true

# 是否启用命令接收模块，用于外部发送切换/锁定/解锁命令
command_enabled: true

# 命令监听 IP，通常 0.0.0.0 表示监听本机所有网卡
command_ip: "0.0.0.0"

# 命令监听端口，用于接收 switch_next、switch_prev、lock_target 等 UDP 命令
command_port: 5006

# OpenCV 显示窗口名称，show=true 时生效
window_name: "YOLO Tracking"

# 本地窗口与网页视频输出可独立开启
display:
  local_window_enabled: false
  fullscreen: false

web_stream:
  enabled: true
  host: "0.0.0.0"
  port: 8081
  jpeg_quality: 75
  max_fps: 20
