name: rescue_competition
initial_stage: PREPARE
auto_start: false
takeoff_altitude_m: 5.0
takeoff_altitude_tolerance_m: 0.5
land_complete_altitude_m: 0.3
local_position_frame: 1
xy_tolerance_m: 0.6
z_tolerance_m: 0.35
max_goal_speed_mps: 0.5

route:
  home:
    x: 0.0
    y: 0.0
  drop_area_center:
    x: 30.0
    y: 0.0
  recce_area_center:
    x: 55.0
    y: 0.0

drop:
  required_payload_drops: 2
  survey_altitude_m: 5.0
  transit_altitude_m: 3.0
  release_altitude_m: 1.0
  survey_hold_s: 1.2
  target_count: 2
  survey_points:
    - {name: drop_p1, x: 28.0, y: -1.2}
    - {name: drop_p2, x: 28.0, y: 1.2}
    - {name: drop_p3, x: 32.0, y: -1.2}
    - {name: drop_p4, x: 32.0, y: 1.2}

payload:
  release_wait_s: 1.0
  return_hold_pwm_after_release: true

payload_slots:
  - id: 1
    servo_channel: 8
    hold_pwm: 1100
    release_pwm: 1900
    drop_center_x: 0.0
    drop_center_y: 0.0
  - id: 2
    servo_channel: 9
    hold_pwm: 1100
    release_pwm: 1900
    drop_center_x: 0.0
    drop_center_y: 0.0

recce:
  survey_altitude_m: 5.0
  transit_altitude_m: 3.0
  identify_altitude_m: 2.0
  visual_descend_altitude_m: 1.0
  survey_hold_s: 1.2
  capture_hold_s: 1.5
  visit_max_count: 5
  required_confirmed_count: 3
  vote_min_count: 3
  vote_min_confidence_sum: 1.2
  output_dir: runtime/logs/recce
  survey_points:
    - {name: recce_p1, x: 53.0, y: -1.2}
    - {name: recce_p2, x: 53.0, y: 1.2}
    - {name: recce_p3, x: 57.0, y: -1.2}
    - {name: recce_p4, x: 57.0, y: 1.2}

vision:
  fov_x_deg: 114.59
  fov_y_deg: 98.86
  image_x_sign: 1.0
  image_y_sign: 1.0
  cylinder_classes: ["bucket"]
  hazard_classes: ["flammable", "toxic", "corrosive", "explosive"]
  min_cylinder_confidence: 0.4
  min_hazard_confidence: 0.4
  cluster_radius_m: 0.8
  edge_margin_norm: 0.85
  lock_center_max_error: 0.65

align:
  kp_vx: 0.8
  kp_vy: 0.8
  max_vx_mps: 0.4
  max_vy_mps: 0.4
  descend_speed_mps: 0.2
  max_ex_cam: 0.06
  max_ey_cam: 0.06
  deadband_ex_cam: 0.015
  deadband_ey_cam: 0.015
  hold_s: 0.5
  lost_timeout_s: 1.0
  min_altitude_m: 0.8
  max_vision_age_s: 0.3
  max_drone_age_s: 0.3
  require_target_locked: true
  vx_sign: 1.0
  vy_sign: 1.0

input_adapter:
  dt_default: 0.02
  dt_min: 0.001
  dt_max: 0.5
  stable_hold_s: 0.3
  age_invalid_value: .inf
  ex_cam_tau_s: 0.08
  ey_cam_tau_s: 0.08
  ex_body_tau_s: 0.08
  ey_body_tau_s: 0.08
  gimbal_yaw_tau_s: 0.10
  gimbal_pitch_tau_s: 0.10
  target_size_tau_s: 0.12

shaper:
  max_vx: 0.4
  max_vy: 0.4
  max_vz: 0.25
  max_yaw_rate: 0.0
  max_gimbal_yaw_rate: 0.0
  max_gimbal_pitch_rate: 0.0
  max_vx_rate: 0.8
  max_vy_rate: 0.8
  max_vz_rate: 0.5
  max_yaw_rate_rate: 0.0
  max_gimbal_yaw_rate_rate: 0.0
  max_gimbal_pitch_rate_rate: 0.0
  smooth_to_zero_when_disabled: true
